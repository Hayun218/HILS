<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HILS 교사 업무 파악 현황</title>
<style>
  :root{
    --teal-dark:#123f3d;
    --teal:#1a6b64;
    --teal-soft:#e5f1ef;
    --gold:#d9a441;
    --gold-soft:#f8ecd2;
    --ink:#20272a;
    --muted:#6c7674;
    --line:#e3e3dd;
    --bg:#faf9f6;
    --card:#ffffff;
    --pt:#c97a35;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
    line-height:1.6;
  }
  .display{ font-family:"Nanum Myeongjo","Batang","Noto Serif KR",serif; }
  .wrap{ max-width:1080px; margin:0 auto; padding:0 24px 100px; }

  /* ---------- Header ---------- */
  .topbar{
    background:var(--teal-dark);
    color:#fff;
  }
  .topbar-inner{
    max-width:1080px; margin:0 auto; padding:36px 24px 30px;
    display:flex; align-items:center; gap:18px; flex-wrap:wrap;
  }
  .crest{ width:56px; height:auto; flex-shrink:0; object-fit:contain; }
  .topbar h1{
    font-size:24px; margin:0 0 4px; font-weight:700; letter-spacing:-0.01em;
  }
  .topbar .sub{ font-size:13px; color:#bcd6d2; margin:0; }
  .split-bar{
    height:5px;
    background:linear-gradient(135deg, var(--gold) 50%, var(--teal) 50%);
    background-size: 24px 5px;
  }

  .page-meta{
    display:flex; justify-content:space-between; align-items:center;
    padding:22px 0 6px; flex-wrap:wrap; gap:10px;
  }
  .page-meta h2{ font-size:20px; margin:0; font-weight:700; }
  .page-meta .date{ font-size:12px; color:var(--muted); }

  /* ---------- Summary stat cards ---------- */
  .stats{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
    margin:22px 0 34px;
    max-width:260px;
  }
  .stat-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:18px 18px 16px;
  }
  .stat-card .label{ font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:8px; font-weight:600;}
  .stat-card .value{ font-size:26px; font-weight:700; font-family:"Nanum Myeongjo",serif; color:var(--teal-dark); }
  .stat-card .value span{ font-size:14px; font-weight:600; color:var(--muted); margin-left:4px; }
  .stat-card .foot{ font-size:11.5px; color:var(--muted); margin-top:6px; }

  /* ---------- Overview bars ---------- */
  .section-title{
    display:flex; align-items:center; gap:10px; margin:38px 0 16px;
  }
  .section-title .tag{
    font-size:10.5px; font-weight:700; letter-spacing:0.08em;
    color:var(--teal); background:var(--teal-soft);
    padding:3px 9px; border-radius:20px;
  }
  .section-title h3{ font-size:17px; margin:0; font-weight:700; }
  .section-title .line{ flex:1; height:1px; background:var(--line); }

  .overview{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:22px 24px 10px;
  }
  .ov-row{
    display:grid;
    grid-template-columns:110px 1fr auto;
    align-items:center;
    gap:16px;
    padding:13px 0;
    border-bottom:1px solid var(--line);
  }
  .ov-row:last-child{ border-bottom:none; }
  .ov-row .who{ font-size:13.5px; font-weight:700; display:flex; align-items:center; gap:6px; }
  .ov-row .type-dot{ width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .ov-row .main-task{ font-size:13px; color:var(--ink); }
  .ov-row .main-task .task-hrs{ color:var(--muted); font-weight:600; margin-left:6px; }
  .ov-row .total-hrs{ font-size:12.5px; font-weight:700; color:var(--teal-dark); text-align:right; white-space:nowrap; }
  .ov-row .total-hrs .lbl{ display:block; font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; }
  .legend{ display:flex; gap:18px; font-size:11.5px; color:var(--muted); padding:8px 2px 16px; }
  .legend span{ display:inline-flex; align-items:center; gap:6px; }
  .legend .dot{ width:8px; height:8px; border-radius:50%; }

  /* ---------- Detail accordions ---------- */
  details.person{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    margin-bottom:12px;
    overflow:hidden;
  }
  details.person > summary{
    list-style:none;
    cursor:pointer;
    padding:18px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
  }
  details.person > summary::-webkit-details-marker{ display:none; }
  .sum-left{ display:flex; align-items:center; gap:12px; }
  .sum-left .name{ font-family:"Nanum Myeongjo",serif; font-size:17px; font-weight:700; }
  .sum-left .role{ font-size:12px; color:var(--muted); }
  .type-badge{
    font-size:10px; font-weight:700; letter-spacing:0.04em;
    padding:3px 9px; border-radius:20px;
  }
  .type-badge.ft{ background:var(--teal-soft); color:var(--teal); }
  .type-badge.pt{ background:var(--gold-soft); color:var(--pt); }
  .sum-right{ display:flex; align-items:center; gap:14px; }
  .sum-right .total{ font-size:16px; font-weight:700; color:var(--teal-dark); }
  .chevron{ transition:transform 0.2s ease; color:var(--muted); }
  details[open] .chevron{ transform:rotate(180deg); }

  .person-note{
    margin:0 22px 14px;
    padding:10px 14px;
    background:var(--gold-soft);
    border-left:3px solid var(--gold);
    border-radius:0 8px 8px 0;
    font-size:12px;
    color:#7a5417;
  }

  .task-table{
    width:100%;
    border-collapse:collapse;
    font-size:12.8px;
  }
  .task-table th{
    text-align:left;
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:var(--muted);
    padding:8px 10px;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    background:var(--bg);
  }
  .task-table td{
    padding:10px 10px;
    border-bottom:1px solid var(--line);
    vertical-align:top;
  }
  .task-table tr:last-child td{ border-bottom:none; }
  .task-table .cat{
    font-size:11px; font-weight:700; color:var(--teal);
    white-space:nowrap;
  }
  .task-table .task-name{ font-weight:600; }
  .task-table .desc{ color:var(--muted); font-size:12px; }
  .task-table .hrs{ white-space:nowrap; font-weight:700; text-align:right; }
  .task-table .note{ color:var(--pt); font-size:11px; }
  tfoot td{
    padding:12px 10px;
    font-weight:700;
    border-top:2px solid var(--teal);
    background:var(--teal-soft);
  }
  tfoot .subtotal-label{ color:var(--teal-dark); }
  tfoot .subtotal-val{ text-align:right; color:var(--teal-dark); }

  footer{
    margin-top:50px;
    padding-top:20px;
    border-top:1px solid var(--line);
    color:var(--muted);
    font-size:11.5px;
    text-align:center;
  }
</style>
</head>
<body>

<div class="topbar">

    <div>
